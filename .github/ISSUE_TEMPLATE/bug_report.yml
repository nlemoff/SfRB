name: Bug report
description: Report a problem with SfRB
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do not include secrets (API keys) in this report. For security vulnerabilities, use private reporting instead (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I run `sfrb open`, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `sfrb init`
        2. Run `sfrb open`
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / request id
      description: Run with `SFRB_LOG_LEVEL=debug` and paste relevant logs. Include the `x-request-id` of any failing `/__sfrb/*` request.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `node dist/cli.js --version` or the commit SHA.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Node.js version (`node --version`).
    validations:
      required: true
